<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Stream Player BY IMApurbo</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0b0f; --bg2:#111318; --bg3:#181b22; --bg4:#1f2330;
    --border:#2a2f3e; --border-glow:#3d4a6b;
    --accent:#4f8fff; --accent2:#7b5fff; --accent-glow:rgba(79,143,255,0.18);
    --text:#e4e8f5; --text2:#8a93b0; --text3:#4f566e;
    --green:#2ecc71; --red:#e74c3c; --gold:#f0c040;
    --hover:rgba(79,143,255,0.07);
    --font:'Exo 2',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

  /* NAV */
  header{
    position:sticky;top:0;z-index:100;
    background:rgba(10,11,15,0.93);backdrop-filter:blur(18px);
    border-bottom:1px solid var(--border);
    padding:0 18px;display:flex;align-items:center;gap:12px;height:54px;
  }
  .logo{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:900;letter-spacing:-.5px}
  .logo-icon{
    width:30px;height:30px;border-radius:7px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-size:15px;box-shadow:0 0 12px var(--accent-glow);
  }
  .logo span{color:var(--accent)}
  .hdr-r{margin-left:auto;display:flex;align-items:center;gap:7px}
  .pill{
    background:var(--bg3);border:1px solid var(--border);
    border-radius:20px;padding:3px 10px;font-size:11px;
    color:var(--text2);font-family:var(--mono);
    display:flex;align-items:center;gap:5px;
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .dot.g{background:var(--green);box-shadow:0 0 6px var(--green)}
  .dot.y{background:var(--gold);box-shadow:0 0 6px var(--gold)}
  .dot.r{background:var(--red);box-shadow:0 0 6px var(--red)}

  /* LAYOUT */
  .shell{display:flex;height:calc(100vh - 54px);position:relative}

  /* SIDEBAR */
  aside{
    width:270px;min-width:270px;flex-shrink:0;
    background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;
    transition:width .25s,min-width .25s;
  }
  aside.collapsed{width:0;min-width:0}

  .aside-top{padding:11px 11px 0;flex-shrink:0}
  .lbl{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}

  /* SERVER TABS */
  .srv-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
  .stab{
    flex:1;min-width:0;
    background:var(--bg3);border:1px solid var(--border);
    color:var(--text2);border-radius:5px;
    padding:5px 7px;font-size:11px;font-weight:700;
    cursor:pointer;text-align:center;transition:all .13s;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .stab:hover{border-color:var(--accent);color:var(--accent)}
  .stab.on{
    background:linear-gradient(135deg,rgba(79,143,255,0.2),rgba(123,95,255,0.1));
    border-color:var(--accent);color:var(--text);
  }
  .badge{background:var(--accent);color:#fff;font-size:9px;padding:1px 4px;border-radius:8px;margin-left:3px;vertical-align:middle}

  /* ADD SERVER */
  .add-row{display:flex;gap:4px;margin-bottom:7px}
  .inp{
    flex:1;background:var(--bg3);border:1px solid var(--border);
    color:var(--text);border-radius:5px;padding:6px 8px;
    font-size:11px;font-family:var(--mono);outline:none;transition:border-color .13s;
  }
  .inp::placeholder{color:var(--text3)}
  .inp:focus{border-color:var(--accent)}
  .add-btn{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;color:#fff;border-radius:5px;
    padding:6px 10px;cursor:pointer;font-size:15px;font-weight:700;
    transition:opacity .13s;flex-shrink:0;
  }
  .add-btn:hover{opacity:.8}

  /* SEARCH */
  .srch{padding:0 11px 7px;flex-shrink:0}
  .srch-inner{position:relative}
  .srch-inner input{
    width:100%;background:var(--bg3);border:1px solid var(--border);
    color:var(--text);border-radius:5px;padding:6px 9px 6px 28px;
    font-size:12px;font-family:var(--font);outline:none;transition:border-color .13s;
  }
  .srch-inner input:focus{border-color:var(--accent)}
  .srch-inner .si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}

  /* GROUPS */
  .grps{padding:0 11px 7px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
  .grps::-webkit-scrollbar{display:none}
  .gbtn{
    background:var(--bg3);border:1px solid var(--border);
    color:var(--text3);border-radius:20px;padding:3px 9px;
    font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;
    transition:all .11s;flex-shrink:0;
  }
  .gbtn:hover{color:var(--text);border-color:var(--border-glow)}
  .gbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ── CHANNEL LIST — logo + name ── */
  .ch-list{
    flex:1;overflow-y:auto;padding:3px 8px 8px;
    scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;
  }
  .ch-list::-webkit-scrollbar{width:3px}
  .ch-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

  .ci{
    display:flex;align-items:center;gap:8px;
    padding:5px 7px;border-radius:6px;
    cursor:pointer;transition:background .1s;
    border-left:2px solid transparent;
  }
  .ci:hover{background:var(--hover)}
  .ci.on{
    background:linear-gradient(90deg,rgba(79,143,255,0.11),transparent);
    border-left-color:var(--accent);
  }
  /* small logo in sidebar */
  .ci-logo{
    width:32px;height:32px;border-radius:6px;object-fit:contain;
    background:var(--bg4);border:1px solid var(--border);flex-shrink:0;
  }
  .ci-ph{
    width:32px;height:32px;border-radius:6px;flex-shrink:0;
    background:var(--bg4);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);
  }
  .ci .num{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:22px;text-align:right;flex-shrink:0}
  .ci .nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .ci.on .nm{color:var(--accent)}

  .empty{padding:28px 12px;text-align:center;color:var(--text3);font-size:12px}
  .empty .bi{font-size:32px;margin-bottom:5px}

  /* SIDEBAR TOGGLE */
  .stgl{
    position:absolute;z-index:50;top:calc(54px + 50%);transform:translateY(-50%);
    left:270px;background:var(--bg3);border:1px solid var(--border);
    color:var(--text3);width:15px;height:42px;border-radius:0 6px 6px 0;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:10px;transition:left .25s;
  }
  aside.collapsed ~ .stgl{left:0}
  
    .brand-sub {
    font-size: 12px;
    color: #aaa;
    font-weight: normal;
  }

  /* MAIN */
  main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

  /* PLAYER */
  .player{
    flex-shrink:0;background:#000;position:relative;
    aspect-ratio:16/9;max-height:50vh;
    display:flex;align-items:center;justify-content:center;
  }
  .p-idle{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:7px;
    background:radial-gradient(ellipse at center,#0d1525 0%,#000 70%);
  }
  .p-idle .ic{font-size:48px;opacity:.1}
  .p-idle .tx{color:var(--text3);font-size:12px}
  #vid{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;z-index:2;display:none}
  .p-ov{
    position:absolute;inset:0;z-index:3;
    background:linear-gradient(transparent 55%,rgba(0,0,0,.75));
    display:flex;align-items:flex-end;
    opacity:0;transition:opacity .18s;pointer-events:none;
  }
  .player:hover .p-ov{opacity:1}
  .ov-info{padding:10px 13px}
  .ov-name{font-size:16px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.9)}
  .ov-grp{font-size:11px;color:var(--text2);margin-top:1px}
  .lbar{position:absolute;bottom:0;left:0;right:0;height:2px;z-index:5;display:none;
    background:linear-gradient(90deg,var(--accent),var(--accent2));transform-origin:left}
  .lbar.on{display:block;animation:lp 1.4s infinite}
  @keyframes lp{0%{transform:scaleX(0);opacity:1}60%{transform:scaleX(.8);opacity:1}100%{transform:scaleX(1);opacity:0}}

  /* NOW PLAYING */
  .np{
    padding:7px 13px;background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:9px;flex-shrink:0;
  }
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .live-dot.on{background:var(--red);box-shadow:0 0 7px var(--red);animation:blink 1.1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .np-lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);flex-shrink:0}
  .np-name{font-size:13px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .np-url{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}

  /* VIEW BAR */
  .vbar{
    padding:7px 13px;background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:7px;flex-shrink:0;
  }
  .vbar-t{font-size:12px;font-weight:700;flex:1}
  .vbar-c{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .vtgl{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:5px;overflow:hidden}
  .vbtn{background:none;border:none;color:var(--text3);padding:4px 8px;cursor:pointer;font-size:13px;transition:all .11s}
  .vbtn.on{background:var(--accent);color:#fff}

  /* GRID */
  .ch-grid{
    flex:1;overflow-y:auto;padding:12px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:7px;
    align-content:start;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;
  }
  .ch-grid::-webkit-scrollbar{width:3px}
  .ch-grid::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
  .gc{
    background:var(--bg3);border:1px solid var(--border);border-radius:9px;
    padding:9px 5px;display:flex;flex-direction:column;align-items:center;gap:5px;
    cursor:pointer;transition:all .16s;text-align:center;
  }
  .gc:hover{border-color:var(--border-glow);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.35)}
  .gc.on{border-color:var(--accent);background:linear-gradient(135deg,rgba(79,143,255,0.12),rgba(123,95,255,0.07));box-shadow:0 0 12px rgba(79,143,255,.16)}
  .gc img{width:46px;height:46px;border-radius:8px;object-fit:contain;background:var(--bg4);border:1px solid var(--border)}
  .gc .ph{width:46px;height:46px;border-radius:8px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text3)}
  .gc .gn{font-size:11px;font-weight:700;line-height:1.3;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

  /* TABLE */
  .ch-tbl{display:none;flex:1;overflow-y:auto;padding:0 12px 12px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
  .ch-tbl.on{display:block}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead tr{border-bottom:2px solid var(--border)}
  th{padding:7px 5px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:800}
  tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .09s}
  tbody tr:hover{background:var(--hover)}
  tbody tr.on{background:linear-gradient(90deg,rgba(79,143,255,.1),transparent)}
  td{padding:6px 5px;vertical-align:middle}

  /* TOAST */
  #toast{
    position:fixed;bottom:18px;right:18px;z-index:999;
    background:var(--bg3);border:1px solid var(--border);
    border-radius:7px;padding:8px 13px;font-size:12px;color:var(--text);
    transform:translateY(55px);opacity:0;transition:all .22s;pointer-events:none;
    box-shadow:0 5px 18px rgba(0,0,0,.4);
  }
  #toast.show{transform:translateY(0);opacity:1}
  #toast.err{border-color:var(--red);color:var(--red)}
  #toast.ok{border-color:var(--green);color:var(--green)}

  @media(max-width:600px){
    aside{width:220px;min-width:220px}
    .stgl{left:220px}
    .player{max-height:26vh}
    .ch-grid{grid-template-columns:repeat(auto-fill,minmax(85px,1fr))}
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">📺</div>IPTV <span>Play</span></div><div class="brand-sub">by @IMApurbo</div>
    <div class="pill"><span class="dot" id="sDot"></span><span id="sLbl">No server</span></div>
    <div class="pill" id="cntPill" style="display:none">📡 <span id="cntN">0</span> ch</div>
  </div>
</header>

<div class="shell">
  <aside id="sb">
    <div class="aside-top">
      <div class="lbl">Servers</div>
      <div class="srv-tabs" id="srvTabs"></div>
      <div class="lbl">Add Playlist URL</div>
      <div class="add-row">
        <input class="inp" id="aName" placeholder="Name" style="max-width:68px">
        <input class="inp" id="aUrl"  placeholder="https://… (.m3u / .m3u8)">
        <button class="add-btn" onclick="addSrv()">＋</button>
      </div>
    </div>
    <div class="srch">
      <div class="srch-inner">
        <span class="si">🔍</span>
        <input placeholder="Search channels…" id="srchInp" oninput="applyFilter()">
      </div>
    </div>
    <div class="grps" id="grpBar"></div>

    <!-- LOGO + NAME LIST -->
    <div class="ch-list" id="chList"></div>
  </aside>

  <button class="stgl" id="stgl" onclick="toggleSb()">◀</button>

  <main>
    <div class="player" id="playerWrap">
      <div class="p-idle" id="pIdle"><div class="ic">📺</div><div class="tx">Select a channel to watch</div></div>
      <video id="vid" controls></video>
      <div class="p-ov"><div class="ov-info"><div class="ov-name" id="ovName"></div><div class="ov-grp" id="ovGrp"></div></div></div>
      <div class="lbar" id="lbar"></div>
    </div>

    <div class="np">
      <span class="live-dot" id="ldot"></span>
      <span class="np-lbl">Now Playing</span>
      <span class="np-name" id="npName">—</span>
      <span class="np-url"  id="npUrl">—</span>
    </div>

    <div class="vbar">
      <span class="vbar-t" id="vTitle">All Channels</span>
      <span class="vbar-c" id="vCnt"></span>
      <div class="vtgl">
        <button class="vbtn on" id="btnG" onclick="setView('grid')" title="Grid">⊞</button>
        <button class="vbtn"    id="btnT" onclick="setView('table')" title="Table">☰</button>
      </div>
    </div>

    <div class="ch-grid" id="chGrid"></div>
    <div class="ch-tbl"  id="chTbl">
      <table>
        <thead><tr><th>#</th><th>Logo</th><th>Channel Name</th><th>Group</th></tr></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── Defaults ──────────────────────────────────────────────────────────────
const DEF = [
  { name:"Server 1", url:"1.m3u" },
  { name:"Server 2", url:"2.m3u8" },
];

// ── State ─────────────────────────────────────────────────────────────────
let srvs   = JSON.parse(localStorage.getItem('iv_srv')||'null') || DEF;
let actSrv = 0;
let allCh  = [], fil = [], actCh = null, actGrp = 'All';
let viewMode = 'grid', hlsObj = null, sbOpen = true;

// ── Boot ──────────────────────────────────────────────────────────────────
function init() { renderTabs(); loadSrv(actSrv); }
function save()  { localStorage.setItem('iv_srv', JSON.stringify(srvs)); }

// ── Tabs ──────────────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('srvTabs').innerHTML = srvs.map((s,i) => `
    <button class="stab ${i===actSrv?'on':''}" onclick="switchSrv(${i})">
      ${esc(s.name)}${allCh.length&&i===actSrv?`<span class="badge">${allCh.length}</span>`:''}
    </button>`).join('');
}

function switchSrv(i) {
  actSrv=i; actCh=null; actGrp='All';
  document.getElementById('srchInp').value='';
  renderTabs(); loadSrv(i);
}

function addSrv() {
  const nm  = document.getElementById('aName').value.trim() || `Server ${srvs.length+1}`;
  const url = document.getElementById('aUrl').value.trim();
  if (!url) { toast('Enter a URL','err'); return; }
  srvs.push({name:nm,url}); save();
  document.getElementById('aName').value='';
  document.getElementById('aUrl').value='';
  renderTabs(); switchSrv(srvs.length-1);
}

// ── Load ──────────────────────────────────────────────────────────────────
async function loadSrv(i) {
  const s = srvs[i];
  setStatus('y',`Loading ${s.name}…`);
  document.getElementById('chList').innerHTML=`<div class="empty"><div class="bi">⏳</div>Loading…</div>`;
  document.getElementById('chGrid').innerHTML='';
  try {
    const r = await fetch(s.url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    allCh = parseM3U(await r.text());
    setStatus('g',`${s.name} · ${allCh.length} ch`);
    document.getElementById('cntPill').style.display='';
    document.getElementById('cntN').textContent=allCh.length;
    renderGrps(); applyFilter(); renderTabs();
    toast(`✅ ${allCh.length} channels — ${s.name}`,'ok');
  } catch(e) {
    setStatus('r','Load failed');
    document.getElementById('chList').innerHTML=`<div class="empty"><div class="bi">❌</div>${esc(e.message)}<br><small>Check URL / CORS</small></div>`;
    document.getElementById('chGrid').innerHTML='';
    toast('Error: '+e.message,'err');
  }
}

// ── M3U parser ────────────────────────────────────────────────────────────
// Handles:
//  1. Lines missing leading # before EXTINF  → treated as EXTINF
//  2. Duplicate group-title="",group-title="X",Name → takes LAST comma segment
//  3. Skips #https / #http comment lines between EXTINF and real URL
function parseM3U(txt) {
  const lines = txt.split('\n').map(l => l.trim()).filter(Boolean);
  const out = [];
  let meta = null;

  for (const line of lines) {
    // Match both "#EXTINF" and bare "EXTINF" (missing #)
    if (/^#?EXTINF/i.test(line)) {
      meta = getMeta(line);
    } else if (line.startsWith('#')) {
      // skip comment / backup-url lines (e.g. #https://...)
    } else if (meta && /^https?:\/\/|^rtmp:\/\//.test(line)) {
      meta.url = line;
      out.push(meta);
      meta = null;
    } else {
      // non-# non-URL line resets pending meta
      meta = null;
    }
  }
  return out;
}

function getMeta(line) {
  // logo
  const logoM  = line.match(/tvg-logo="([^"]+)"/);
  const logo   = logoM ? logoM[1] : '';

  // group: last group-title="..." wins (handles double group-title)
  let group = 'General';
  const groupMatches = [...line.matchAll(/group-title="([^"]*)"/g)];
  if (groupMatches.length) {
    // pick last non-empty, strip emoji-only or blank groups
    for (let i = groupMatches.length - 1; i >= 0; i--) {
      const g = groupMatches[i][1].trim();
      if (g) { group = g; break; }
    }
  }

  // name: everything after the LAST comma in the line
  // This correctly handles: group-title="",group-title="X",Channel Name
  const lastComma = line.lastIndexOf(',');
  let name = lastComma >= 0 ? line.slice(lastComma + 1).trim() : 'Unknown';
  if (!name) name = 'Unknown';

  return { name, logo, group, url:'' };
}

// ── Groups ────────────────────────────────────────────────────────────────
function renderGrps() {
  const gs = ['All', ...new Set(allCh.map(c => c.group))];
  document.getElementById('grpBar').innerHTML = gs.map(g =>
    `<button class="gbtn ${g===actGrp?'on':''}" onclick="setGrp(${JSON.stringify(g)})">${esc(g)}</button>`
  ).join('');
}

function setGrp(g) {
  actGrp = g;
  document.querySelectorAll('.gbtn').forEach(b => b.classList.toggle('on', b.textContent === g));
  applyFilter();
}

// ── Filter ────────────────────────────────────────────────────────────────
function applyFilter() {
  const q = document.getElementById('srchInp').value.toLowerCase();
  fil = allCh.filter(c => {
    const gok = actGrp === 'All' || c.group === actGrp;
    const sok = !q || c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q);
    return gok && sok;
  });
  renderList(); renderGrid(); renderTbl();
  const t = actGrp === 'All' ? 'All Channels' : actGrp;
  document.getElementById('vTitle').textContent = t;
  document.getElementById('vCnt').textContent = `${fil.length} channels`;
}

// ── Sidebar list — small logo + name ─────────────────────────────────────
function renderList() {
  const el = document.getElementById('chList');
  if (!fil.length) {
    el.innerHTML = `<div class="empty"><div class="bi">📭</div>No channels found</div>`;
    return;
  }
  el.innerHTML = fil.map(c => {
    const i = allCh.indexOf(c);
    const logoHtml = c.logo
      ? `<img class="ci-logo" src="${esc(c.logo)}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">`
      : '';
    const phStyle = c.logo ? 'display:none' : '';
    return `<div class="ci ${actCh===c?'on':''}" onclick="play(${i})">
      ${logoHtml}
      <div class="ci-ph" style="${phStyle}">📺</div>
      <span class="num">${(i+1).toString().padStart(3,'0')}</span>
      <span class="nm">${esc(c.name)}</span>
    </div>`;
  }).join('');
}

// ── Grid ──────────────────────────────────────────────────────────────────
function renderGrid() {
  document.getElementById('chGrid').innerHTML = fil.map(c => {
    const i = allCh.indexOf(c);
    const logoHtml = c.logo
      ? `<img src="${esc(c.logo)}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">`
      : '';
    const phStyle = c.logo ? 'display:none' : '';
    return `<div class="gc ${actCh===c?'on':''}" onclick="play(${i})">
      ${logoHtml}
      <div class="ph" style="${phStyle}">📺</div>
      <div class="gn">${esc(c.name)}</div>
    </div>`;
  }).join('');
}

// ── Table ─────────────────────────────────────────────────────────────────
function renderTbl() {
  document.getElementById('tBody').innerHTML = fil.map(c => {
    const i = allCh.indexOf(c);
    return `<tr class="${actCh===c?'on':''}" onclick="play(${i})">
      <td style="color:var(--text3);font-family:var(--mono)">${(i+1).toString().padStart(3,'0')}</td>
      <td>${c.logo
        ? `<img src="${esc(c.logo)}" onerror="this.style.display='none'" alt=""
              style="width:26px;height:26px;border-radius:4px;object-fit:contain;background:var(--bg4)">`
        : '<span style="font-size:16px">📺</span>'}</td>
      <td style="font-weight:700">${esc(c.name)}</td>
      <td style="color:var(--text3)">${esc(c.group)}</td>
    </tr>`;
  }).join('');
}

// ── Playback ──────────────────────────────────────────────────────────────
function play(i) {
  const ch = allCh[i]; actCh = ch;
  renderList(); renderGrid(); renderTbl();
  setTimeout(() => {
    const a = document.querySelector('.ci.on');
    if (a) a.scrollIntoView({ block:'nearest' });
  }, 40);

  document.getElementById('pIdle').style.display = 'none';
  const v = document.getElementById('vid');
  v.style.display = 'block';
  document.getElementById('ldot').classList.add('on');
  document.getElementById('npName').textContent = ch.name;
  document.getElementById('npUrl').textContent  = ch.url;
  document.getElementById('ovName').textContent  = ch.name;
  document.getElementById('ovGrp').textContent   = ch.group || '';
  document.getElementById('lbar').classList.add('on');

  if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
  v.removeAttribute('src');

  if (/\.m3u8|\.ts|\.fmp4/.test(ch.url) || ch.url.includes('m3u8')) {
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsObj = new Hls({ enableWorker:true });
      hlsObj.loadSource(ch.url);
      hlsObj.attachMedia(v);
      hlsObj.on(Hls.Events.MANIFEST_PARSED, () => { v.play(); done(); });
      hlsObj.on(Hls.Events.ERROR, (_,d) => { if(d.fatal){ toast('Stream error: '+d.type,'err'); done(); } });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
      v.src = ch.url; v.play(); done();
    } else {
      toast('HLS not supported in this browser','err'); done();
    }
  } else {
    v.src = ch.url;
    v.play().catch(e => toast('Play error: '+e.message,'err'));
    done();
  }
}

function done() { document.getElementById('lbar').classList.remove('on'); }

// ── View ──────────────────────────────────────────────────────────────────
function setView(v) {
  viewMode = v;
  document.getElementById('chGrid').style.display = v==='grid' ? 'grid' : 'none';
  document.getElementById('chTbl').classList.toggle('on', v==='table');
  document.getElementById('btnG').classList.toggle('on', v==='grid');
  document.getElementById('btnT').classList.toggle('on', v==='table');
}

// ── Sidebar toggle ────────────────────────────────────────────────────────
function toggleSb() {
  sbOpen = !sbOpen;
  document.getElementById('sb').classList.toggle('collapsed', !sbOpen);
  const b = document.getElementById('stgl');
  b.textContent = sbOpen ? '◀' : '▶';
  b.style.left  = sbOpen ? '270px' : '0';
}

// ── Status ────────────────────────────────────────────────────────────────
function setStatus(c, t) {
  document.getElementById('sDot').className = 'dot '+c;
  document.getElementById('sLbl').textContent = t;
}

// ── Toast ─────────────────────────────────────────────────────────────────
let tmr;
function toast(m, tp='') {
  const t = document.getElementById('toast');
  t.textContent = m; t.className = 'show'+(tp?' '+tp:'');
  clearTimeout(tmr); tmr = setTimeout(() => t.className='', 3200);
}

// ── Escape HTML ───────────────────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (!actCh || !allCh.length) return;
  const cur = allCh.indexOf(actCh);
  if (e.key === 'ArrowDown') play(Math.min(cur+1, allCh.length-1));
  if (e.key === 'ArrowUp')   play(Math.max(cur-1, 0));
  if (e.key === 'f' || e.key === 'F') document.getElementById('vid').requestFullscreen?.();
});

// ── HLS.js ────────────────────────────────────────────────────────────────
const sc = document.createElement('script');
sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js';
document.head.appendChild(sc);

init();
</script>
